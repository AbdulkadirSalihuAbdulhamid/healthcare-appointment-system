{% load static %}
{# Small avatar: uses profile.image (static fallback when /media/ missing on Render) #}
{% with person=user_obj|default:profile.user %}
    <img class="avatar-img rounded-circle profile-avatar-img"
         src="{{ profile.image }}"
         alt="{{ person.get_full_name }}"
         width="40"
         height="40">
{% endwith %}
