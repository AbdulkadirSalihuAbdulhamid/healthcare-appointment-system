{% load static %}
{# Doctor card image: real photo if on disk, else static SVG + initials (works on Render) #}
{% with person=user_obj|default:profile.user %}
<div class="doctor-portrait-frame">
    <img class="img-fluid doctor-portrait-img{% if extra_class %} {{ extra_class }}{% endif %}{% if not profile.has_stored_avatar %} doctor-portrait-img--placeholder{% endif %}"
         src="{{ profile.image }}"
         alt="{{ person.get_full_name }}">
    {% if not profile.has_stored_avatar %}
        <div class="doctor-portrait-initials doctor-portrait-initials--badge">
            <span>{{ person.first_name|first|upper }}{{ person.last_name|first|upper }}</span>
        </div>
    {% endif %}
</div>
{% endwith %}
